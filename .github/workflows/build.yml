name: Build & Test

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (Windows, Rust + Delphi)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mmarch-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --test integration --release
        # Delphi binary not available in CI; tests run Rust binary only

  build:
    name: Build ${{ matrix.name }}
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: mmarch-linux-x64
          - name: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: mmarch-linux-arm64
          - name: linux-ia32
            os: ubuntu-latest
            target: i686-unknown-linux-musl
            artifact: mmarch-linux-ia32
          - name: darwin-x64
            os: macos-14
            target: x86_64-apple-darwin
            artifact: mmarch-darwin-x64
          - name: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
            artifact: mmarch-darwin-arm64
    defaults:
      run:
        working-directory: mmarch-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # musl toolchains for Linux static builds
      - name: Install musl tools (x64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install musl tools (arm64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: aarch64-unknown-linux-musl

      - name: Install musl tools (i686)
        if: matrix.target == 'i686-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib musl-tools
          sudo ln -sf /usr/bin/musl-gcc /usr/local/bin/i686-linux-musl-gcc || true
        # i686-musl may need cross crate fallback

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          STRIP_CMD="strip"
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            STRIP_CMD="aarch64-linux-gnu-strip"
          fi
          $STRIP_CMD target/${{ matrix.target }}/release/mmarch || true

      - name: Rename binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/mmarch dist/mmarch
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: mmarch-rust/dist/mmarch
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare binaries
        run: |
          for dir in artifacts/mmarch-*; do
            name=$(basename "$dir")
            chmod +x "$dir/mmarch" 2>/dev/null || true
            cp "$dir/mmarch" "./${name}"
          done

          # Windows: Delphi prebuilt from repo
          cp mmarch-delphi/mmarch.exe ./mmarch.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "mmarch ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | Windows (32/64-bit) | `mmarch.exe` |
            | Linux x64 | `mmarch-linux-x64` |
            | Linux arm64 | `mmarch-linux-arm64` |
            | Linux ia32 | `mmarch-linux-ia32` |
            | macOS Intel | `mmarch-darwin-x64` |
            | macOS Apple Silicon | `mmarch-darwin-arm64` |

            Also available via npm: `npm install -g mmarch`
          files: |
            mmarch.exe
            mmarch-linux-x64
            mmarch-linux-arm64
            mmarch-linux-ia32
            mmarch-darwin-x64
            mmarch-darwin-arm64

  npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish
        working-directory: mmarch-npm
        run: npm publish --provenance --access public